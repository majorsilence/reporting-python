name: Build and Publish to PyPI

# Triggers:
#   - GitHub release published: prompts for the RdlNative tag to bundle
#   - Manual dispatch: pick any RdlNative release tag explicitly
#
# RdlNative releases live at: https://github.com/majorsilence/Reporting/releases
# Asset naming: {version}-majorsilence-reporting-rdlnative-{platform}.zip
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      rdlnative_tag:
        description: >
          RdlNative release tag from majorsilence/Reporting to bundle
          (e.g. 26.0.0). Defaults to the latest release.
        required: false
        default: ''

jobs:
  # ── Build platform-specific wheels (one per platform) ──────────────────────
  build-native-wheels:
    name: Wheel (${{ matrix.platform_tag }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_tag: manylinux_2_17_x86_64
            asset_pattern: '*-majorsilence-reporting-rdlnative-linux-x64.zip'
          - platform_tag: manylinux_2_17_aarch64
            asset_pattern: '*-majorsilence-reporting-rdlnative-linux-arm64.zip'
          - platform_tag: win_amd64
            asset_pattern: '*-majorsilence-reporting-rdlnative-windows.zip'
          - platform_tag: macosx_11_0_arm64
            asset_pattern: '*-majorsilence-reporting-rdlnative-osx.zip'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build wheel

      - name: Resolve RdlNative release tag
        id: native_tag
        run: |
          if [ -n "${{ inputs.rdlnative_tag }}" ]; then
            TAG="${{ inputs.rdlnative_tag }}"
          else
            TAG=$(gh release view --repo majorsilence/Reporting --json tagName -q .tagName)
          fi
          echo "Resolved RdlNative tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download RdlNative asset
        run: |
          mkdir -p /tmp/rdlnative
          gh release download "${{ steps.native_tag.outputs.tag }}" \
            --repo majorsilence/Reporting \
            --pattern "${{ matrix.asset_pattern }}" \
            --dir /tmp/rdlnative
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Unpack native libraries into package
        run: |
          mkdir -p src/majorsilence_reporting/native
          mkdir -p /tmp/rdlnative/unpacked
          ASSET=$(ls /tmp/rdlnative/*.zip | head -1)
          unzip "$ASSET" -d /tmp/rdlnative/unpacked
          # Copy every file found (handles flat or single-subdir zip layouts)
          find /tmp/rdlnative/unpacked -maxdepth 3 -type f \
            -exec cp -v {} src/majorsilence_reporting/native/ \;

      - name: Build wheel
        run: python -m build --wheel --outdir dist/

      - name: Retag wheel with platform tag
        run: |
          wheel tags \
            --python-tag py3 \
            --abi-tag none \
            --platform-tag "${{ matrix.platform_tag }}" \
            --remove \
            dist/*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform_tag }}
          path: dist/*.whl

  # ── Build pure-Python wheel + sdist (no bundled natives) ───────────────────
  build-pure:
    name: Pure wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Build
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist-pure
          path: dist/

  # ── Publish everything to PyPI ─────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build-native-wheels, build-pure]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: 'wheel-*'
          merge-multiple: true
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: dist-pure
          path: dist/

      - name: List artifacts
        run: ls -lh dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
